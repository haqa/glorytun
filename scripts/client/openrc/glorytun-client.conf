# Configuration for glorytun-client
# Install to: /etc/conf.d/glorytun-client
#
# Defines a single multipath tunnel from this machine (client) to a remote
# server, using one or more local network interfaces as separate paths.

# ── Tunnel ────────────────────────────────────────────────────────────────

# TUN device name
TUN_DEV="tun0"

# Remote server address and port
SERVER_ADDR="203.0.113.1"
SERVER_PORT="5000"

# Key file for this tunnel
KEYFILE="/etc/glorytun/key"

# Tunnel IP addressing — applied to TUN_DEV after it is created.
# Use CIDR notation. Leave empty to skip (if managed elsewhere).
TUN_LOCAL_IP="10.99.0.2/30"

# ── Interfaces / paths ───────────────────────────────────────────────────
#
# Space-separated list of INTERFACE:GATEWAY pairs.
# Each interface becomes a separate path through the tunnel.
# The gateway is used for source-based policy routing so that packets
# with that interface's source IP leave via the correct physical link.
#
# Example:
#   INTERFACES="eth1:192.168.1.254 eth2:192.168.12.252 eth3:192.168.11.5"

INTERFACES="eth1:192.168.1.254 eth2:10.0.0.1 eth3:172.16.0.1 eth4:10.1.0.1"

# ── Path settings ────────────────────────────────────────────────────────

# Rate mode: "fixed" or "auto"
RATE_MODE="fixed"

# Transmit / receive limits per path (bytes/sec with optional suffix).
#
# The init script always passes `rate … tx … rx …` to glorytun. If you comment
# these lines out, the shell still substitutes built-in defaults — you are
# not omitting the limits.
#
# fixed: values are the actual rate. Unset defaults to ~100 Mbit each way.
# auto:  values are *ceilings*; the daemon probes below that. If you still
#        see ~100 Mbit after switching to auto, you were likely still using
#        12500k as the ceiling — raise RATE_TX/RATE_RX or leave them unset
#        (auto uses a much larger default cap, or set RATE_AUTO_*_MAX).
RATE_TX="12500k"
RATE_RX="12500k"

# Optional: when RATE_MODE=auto and RATE_TX / RATE_RX are unset, use these
# ceilings instead of the script default (≈100 Gbit class).
# RATE_AUTO_TX_MAX="12500000k"
# RATE_AUTO_RX_MAX="12500000k"

# Keepalive beat interval (time suffix: s, ms, etc.)
BEAT="500ms"

# Packet loss percentage at which a path is considered degraded
LOSSLIMIT="30%"

# Max heartbeats without a reply before the path is treated as degraded
# (`glorytun path … set miss N`). Omit or leave empty to use the MUD default;
# set to 0 to request the default explicitly. Range 0–255 when set.
# HEARTBEAT_MISS="5"

# Initial path state for `glorytun path … set`: "up" or "down"
PATH_STATE="up"

# ── Routing ──────────────────────────────────────────────────────────────

# Starting routing table number for source-based policy routes.
# Each interface gets its own table: RT_TABLE_START, RT_TABLE_START+1, ...
RT_TABLE_START=101

# Reverse path filter mode applied to all interfaces.
#   0 = disabled, 1 = strict, 2 = loose (recommended for multipath)
RP_FILTER=2

# ── Glorytun binary ──────────────────────────────────────────────────────

# Path to the glorytun binary
GLORYTUN_BIN="/usr/local/bin/glorytun"

# Extra options passed to glorytun bind (e.g. "chacha persist")
GLORYTUN_OPTS="persist"
